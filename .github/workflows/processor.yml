name: Node Task Processor

on:
  schedule:
    - cron: '*/10 * * * *' # Executes every 10 minutes
  workflow_dispatch:

jobs:
  execute-node:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests deep-translator

      - name: Process Data Streams
        env:
          HOOK_URL: ${{ secrets.HOOK_URL }}
          NODE_ENV_VARS: ${{ secrets.NODE_ENV_VARS }}
        run: python processor.py

      - name: Sync Local Cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add local_cache.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync node cache" && git push)
